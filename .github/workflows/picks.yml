name: Manhattan Model Auto Picks

on:
  schedule:
    - cron: '0 18 * * *'
    - cron: '59 21 * * *'
    - cron: '45 0 * * *'
    - cron: '0 16 * * 6,0'
    - cron: '0 20 * * 6,0'
  workflow_dispatch:

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Manhattan Model
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python picks_engine.py

      - name: Save picks to repo
        run: |
          git config user.name "MaxedOutBot"
          git config user.email "bot@ricsbestbets.com"
          git add pending_picks.json picks_log.json
          git diff --staged --quiet || git commit -m "Auto picks $(date -u +%Y-%m-%d-%H%M)"
          git push

      - name: Notify Ric — picks ready for approval
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RIC_EMAIL:      ${{ secrets.FROM_EMAIL }}
        run: python notify_ric.py

      - name: Keep repo active
        run: |
          git config user.name "MaxedOutBot"
          git config user.email "bot@ricsbestbets.com"
          git commit --allow-empty -m "Scheduled run $(date -u +%Y-%m-%d)"
          git push
