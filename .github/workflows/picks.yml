name: RicsBestBets — Generate Picks

on:
  schedule:
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * 6,0'
    - cron: '0 23 * * *'
    - cron: '45 1 * * *'
  workflow_dispatch:

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pybaseball feedparser

      - name: Run Manhattan Model
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python picks_engine.py

      - name: Save picks to repo
        run: |
          git config user.name "RBB Bot"
          git config user.email "bot@ricsbestbets.com"
          git add pending_picks.json picks_log.json model_state.json opening_lines.json || true
          git diff --cached --quiet || git commit -m "Picks update $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push

      - name: Notify Ric
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python notify_ric.py || true

      - name: Keep repo active
        run: echo "Active $(date)" >> .keepalive && git add .keepalive && git diff --cached --quiet || git commit -m "keepalive" && git push || true
