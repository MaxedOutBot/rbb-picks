name: Manhattan Model Auto Picks

on:
  schedule:
    - cron: '0 18 * * *'    # 11:00am PT — all days
    - cron: '59 21 * * *'   # 2:59pm PT  — all days
    - cron: '45 0 * * *'    # 5:45pm PT  — all days
    - cron: '0 16 * * 6,0'  # 9:00am PT  — Sat & Sun only
    - cron: '0 20 * * 6,0'  # 1:00pm PT  — Sat & Sun only
  workflow_dispatch:

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Manhattan Model
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python picks_engine.py

      - name: Notify Ric — picks ready for approval
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RIC_EMAIL:      ${{ secrets.FROM_EMAIL }}
          TWILIO_SID:     ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN:   ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:    ${{ secrets.TWILIO_FROM }}
          RIC_PHONE:      ${{ secrets.RIC_PHONE }}
        run: python notify_ric.py

      - name: Keep repo active
        run: |
          git config user.name "MaxedOutBot"
          git config user.email "bot@ricsbestbets.com"
          git commit --allow-empty -m "Scheduled run $(date -u +%Y-%m-%d)"
          git push
